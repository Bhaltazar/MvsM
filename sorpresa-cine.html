<!DOCTYPE html>
<html lang="es">
<head>

<style>
  /* ============================================================
     CONFIGURACIÓN RÁPIDA — edita aquí sin tocar el resto del código
     ============================================================ */
  :root{
    --bg-deep:#241019;
    --bg-velvet:#331722;
    --bg-velvet-2:#3d1c29;
    --gold:#E7B84B;
    --gold-soft:#C99A3E;
    --cream:#F6E9D8;
    --cream-dim:#CBB79E;
    --rose:#D8657A;
    --rose-dim:#7A3A46;
    --ink:#180A0F;
    --ok:#8FBF8A;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% -10%, var(--bg-velvet-2), transparent 55%),
      radial-gradient(circle at 100% 110%, var(--bg-velvet-2), transparent 50%),
      var(--bg-deep);
    color:var(--cream);
    font-family:'Cormorant Garamond', serif;
    overflow-x:hidden;
    position:relative;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:repeating-linear-gradient(90deg, rgba(0,0,0,.18) 0px, rgba(0,0,0,.18) 2px, transparent 2px, transparent 34px);
    pointer-events:none;
    opacity:.5;
    z-index:0;
  }

  h1,h2,h3,.display{
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:.06em;
    font-weight:400;
    color:var(--gold);
    text-shadow:0 0 18px rgba(231,184,75,.25);
  }
  .mono{font-family:'DM Mono', monospace;}

  #hud{
    position:fixed;
    top:16px; left:16px;
    z-index:20;
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:flex-start;
  }
  .ticket-timer{
    background:linear-gradient(135deg, var(--bg-velvet), var(--ink));
    border:1px solid var(--gold-soft);
    border-radius:10px;
    padding:10px 16px 10px 14px;
    box-shadow:0 6px 24px rgba(0,0,0,.4);
    position:relative;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .ticket-timer::before, .ticket-timer::after{
    content:"";
    position:absolute;
    width:12px; height:12px;
    background:var(--bg-deep);
    border-radius:50%;
    top:50%; transform:translateY(-50%);
  }
  .ticket-timer::before{ left:-6px; }
  .ticket-timer::after{ right:-6px; }
  .timer-label{
    font-family:'DM Mono', monospace;
    font-size:.62rem;
    letter-spacing:.14em;
    color:var(--cream-dim);
    text-transform:uppercase;
    display:block;
  }
  .timer-value{
    font-family:'DM Mono', monospace;
    font-size:1.35rem;
    color:var(--gold);
    letter-spacing:.03em;
    line-height:1;
  }
  .hearts{
    display:flex;
    gap:6px;
    padding:2px 4px;
  }
  .heart{
    width:22px; height:22px;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));
    transition:transform .25s ease, opacity .25s ease;
  }
  .heart.lost{ opacity:.18; transform:scale(.8); }
  .heart svg{ width:100%; height:100%; }

  #app{
    position:relative;
    z-index:1;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:110px 20px 40px;
  }
  .card{
    width:100%;
    max-width:560px;
    background:linear-gradient(160deg, rgba(61,28,41,.9), rgba(24,10,15,.94));
    border:1px solid rgba(231,184,75,.25);
    border-radius:18px;
    padding:38px 34px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    animation:riseIn .6s ease both;
  }
  @keyframes riseIn{
    from{opacity:0; transform:translateY(18px);}
    to{opacity:1; transform:translateY(0);}
  }
  .eyebrow{
    font-family:'DM Mono', monospace;
    font-size:.72rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--rose);
    margin:0 0 6px;
  }
  h1.title{ font-size:2.5rem; margin:0 0 14px; line-height:1; }
  h2.title{ font-size:2rem; margin:0 0 10px; line-height:1; }
  p{ font-size:1.15rem; line-height:1.55; color:var(--cream); margin:0 0 16px; }
  .dim{ color:var(--cream-dim); font-size:1rem; }

  .btn{
    font-family:'Bebas Neue', sans-serif;
    letter-spacing:.08em;
    font-size:1.2rem;
    background:var(--gold);
    color:var(--ink);
    border:none;
    border-radius:8px;
    padding:12px 26px;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
    box-shadow:0 6px 18px rgba(231,184,75,.25);
  }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 10px 24px rgba(231,184,75,.35); }
  .btn:active{ transform:translateY(0); }
  .btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
  .btn.secondary{
    background:transparent;
    color:var(--gold);
    border:1px solid var(--gold-soft);
    box-shadow:none;
  }

  .puzzle-word{
    font-family:'DM Mono', monospace;
    font-size:1.6rem;
    letter-spacing:.18em;
    color:var(--gold);
    background:rgba(0,0,0,.25);
    border:1px dashed var(--gold-soft);
    border-radius:10px;
    padding:16px;
    text-align:center;
    margin:18px 0;
  }
  input[type=text]{
    width:100%;
    font-family:'Cormorant Garamond', serif;
    font-size:1.2rem;
    padding:12px 14px;
    border-radius:8px;
    border:1px solid var(--gold-soft);
    background:rgba(0,0,0,.25);
    color:var(--cream);
    outline:none;
    margin-bottom:12px;
  }
  input[type=text]:focus{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(231,184,75,.15); }
  .feedback{
    min-height:1.4rem;
    font-family:'DM Mono', monospace;
    font-size:.95rem;
    margin-bottom:10px;
  }
  .feedback.ok{ color:var(--ok); }
  .feedback.err{ color:var(--rose); }

  .level-tag{
    display:inline-block;
    font-family:'DM Mono', monospace;
    font-size:.75rem;
    letter-spacing:.14em;
    color:var(--ink);
    background:var(--rose);
    padding:4px 10px;
    border-radius:999px;
    margin-bottom:12px;
  }

  .option-row{ display:flex; gap:10px; margin:10px 0 12px; }
  .option-row .btn{ flex:1; }
  .option-list{ display:flex; flex-direction:column; gap:8px; margin:10px 0 12px; }
  .option-list .btn{ width:100%; text-align:left; font-size:1.05rem; padding:10px 16px; }

  .ticket-wrap{
    display:flex;
    justify-content:center;
    margin:14px 0 6px;
  }
  .ticket{
    position:relative;
    width:100%;
    max-width:420px;
    background:var(--cream);
    color:var(--ink);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 22px 50px rgba(0,0,0,.55);
    display:flex;
    animation:popIn .7s cubic-bezier(.2,.9,.3,1.2) both;
  }
  @keyframes popIn{
    from{opacity:0; transform:scale(.85) rotate(-3deg);}
    to{opacity:1; transform:scale(1) rotate(-1.5deg);}
  }
  .ticket-main{
    flex:1;
    padding:20px 18px;
    background:
      repeating-linear-gradient(135deg, rgba(216,101,122,.06) 0 10px, transparent 10px 20px);
  }
  .ticket-main .kicker{
    font-family:'DM Mono', monospace;
    font-size:.65rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--rose-dim);
  }
  .ticket-main h3{
    color:var(--ink);
    font-size:1.9rem;
    margin:2px 0 10px;
    text-shadow:none;
  }
  .ticket-main .row{
    display:flex;
    justify-content:space-between;
    font-family:'DM Mono', monospace;
    font-size:.72rem;
    color:#4a2a33;
    border-top:1px dashed rgba(0,0,0,.2);
    padding-top:8px;
    margin-top:8px;
  }
  .ticket-stub{
    width:74px;
    border-left:2px dashed rgba(0,0,0,.25);
    display:flex;
    align-items:center;
    justify-content:center;
    writing-mode:vertical-rl;
    font-family:'DM Mono', monospace;
    font-size:.7rem;
    letter-spacing:.2em;
    color:#4a2a33;
    position:relative;
  }
  .ticket-stub::before, .ticket-stub::after{
    content:"";
    position:absolute;
    width:16px; height:16px;
    background:var(--bg-deep);
    border-radius:50%;
    left:50%; transform:translateX(-50%);
  }
  .ticket-stub::before{ top:-8px; }
  .ticket-stub::after{ bottom:-8px; }
  #ticketPhoto{
    width:100%; display:block; border-radius:14px;
    box-shadow:0 22px 50px rgba(0,0,0,.55);
  }

  .footer-note{
    text-align:center;
    color:var(--cream-dim);
    font-size:.85rem;
    margin-top:18px;
  }

  @media (max-width:480px){
    .card{ padding:28px 20px; }
    h1.title{ font-size:2rem; }
    #hud{ top:10px; left:10px; }
  }
</style>
</head>
<body>

<div id="hud">
  <div class="ticket-timer">
    <div>
      <span class="timer-label">Función en</span>
      <span class="timer-value mono" id="timerValue">--:--:--</span>
    </div>
  </div>
  <div class="hearts" id="hearts"></div>
</div>

<div id="app"></div>

<script>
/* ============================================================
   CONTENIDO EDITABLE — cambia nombres, acertijos y mensaje aquí
   ============================================================ */
const NOVIA_NAME = "mi amor";
const MENSAJE_FINAL = "Pasaste cada nivel, cada acertijo, cada intento... tal como quiero que pases el resto de mis planes conmigo. Esta es nuestra próxima función. Te amo.";
const PELICULA = "SORPRESA · FUNCIÓN ESPECIAL";
const SALA = "SALA 1 · CONTIGO";
const ASIENTO = "F7 - F8";

// Fecha y hora de la revelación (año, mes 0-indexado, día, hora, min)
const DEADLINE = new Date(2026, 6, 20, 15, 0, 0);

// Cuánto tiempo suma el contador al perder una vida (minutos)
const MINUTOS_POR_VIDA_PERDIDA = 18;
// Tiempo mínimo restante que puede quedar aunque gane todo (minutos)
const MINUTOS_MINIMOS = 10;

// Cada prueba tiene un "pool" de 3 variantes. Cuando un nivel se
// reinicia (por perder las 3 vidas), se elige una variante distinta a la
// que ya se mostró, para que no se repita la misma respuesta.
// Ahora son 4 niveles en total.
const LEVELS = [
  {
    title: "Nivel 1 · El comienzo",
    intro: "Aquí empieza todo. Nada complicado, solo cosas que ya sabes de nosotros.",
    puzzles: [
      [
        { type:"riddle", prompt:"Somos dos, pero cuando estamos juntos actuamos como uno solo. ¿Cómo se le llama a eso?", answer:"pareja" },
        { type:"riddle", prompt:"Es lo primero que vi en ti y me enamoró por completo. ¿Fueron tal vez en tus...?", answer:"besos" },
        { type:"riddle", prompt:"Cuando pienso en algo y tu ya lo estas imaginando tambien. ¿Cómo se llama eso que tenemos?", answer:"conexion" }
      ],
      [
        { type:"complete", display:"_ O N _ _ A N _ A", hint:"Lo que crece cada día que pasamos juntos", answer:"confianza" },
        { type:"complete", display:"_ _ N _ _ A", hint:"Fue y será el apodo más lindo que pude haberte dicho", answer:"bonita" },
        { type:"complete", display:"E _ _ _ S _", hint:"Quiero que llegues a serlo algún día", answer:"esposa" }
      ]
    ]
  },
  {
    title: "Nivel 2 · Nuestros momentos",
    intro: "Ahora unas de nuestros ratos juntos. Piensa en lo que hacemos cuando estamos solos tú y yo.",
    puzzles: [
      [
        { type:"riddle", prompt:"No pesa, no se ve, pero es clave en nuestra relación. ¿Qué es?", answer:"comunicacion" },
        { type:"riddle", prompt:"Aparece en tu rostro y hace sentir bien y feliz. ¿Qué es?", answer:"sonrisa" },
        { type:"riddle", prompt:"Cuando quedamos de vernos...nos arreglamos y quedamos a una hora. ¿Cómo se le llama a eso?", answer:"cita" }
      ],
      [
        { type:"complete", display:"M O _ S _ _ U _", hint:"Es algo que da miedo, puede ser grande o pequeño", answer:"monstruo" },
        { type:"complete", display:"_ _ R _ E", hint:"El color azul y amarillo hacen, que color", answer:"verde" },
        { type:"complete", display:"_ A _ _ L", hint:"Esta sera facil...", answer:"facil" }
      ]
    ]
  },
  {
    title: "Nivel 3 · Complicidad",
    intro: "Aquí cambia el juego: ahora son preguntas de verdadero o falso, y opción múltiple.",
    puzzles: [
      [
        { type:"truefalse", statement:"Los mejores momentos se disfrutan más con la persona correcta al lado.", answer:true },
        { type:"truefalse", statement:"Una relación funciona bien sin comunicación, solo con amor.", answer:false },
        { type:"truefalse", statement:"Las peleas tontas también pueden fortalecer a una pareja si se resuelven bien.", answer:true }
      ],
      [
        { type:"multiple", prompt:"¿Qué deberíamos hacer primero cuando algo nos molesta del otro?", options:["Hablarlo con calma","Ignorarlo y esperar que se resuelva solo","Contárselo a medio mundo menos a la pareja","Enojarse y no hablar por días"], answer:"Hablarlo con calma" },
        { type:"multiple", prompt:"¿Cuál es el ingrediente que nunca debe faltar en un buen momento de pareja?", options:["Confianza","Silencio incómodo","Celular todo el tiempo","Peleas"], answer:"Confianza" },
        { type:"multiple", prompt:"¿Qué hace más fuerte a una pareja?", options:["Ignorarse cuando hay problemas","Competir por quién tiene la razón","Hablar las cosas con calma","Guardarse todo"], answer:"Hablar las cosas con calma" }
      ]
    ]
  },
  {
    title: "Nivel 4 · La sorpresa",
    intro: "Último nivel: descifra lo que dicen los emojis.",
    puzzles: [
      [
        { type:"emoji", emojis:"❤️♾️", hint:"Nuestro amor es igual a eso", answer:"infinito" },
        { type:"emoji", emojis:"🥰💌", hint:"Cada día crece mas por ti", answer:"amor" },
        { type:"emoji", emojis:"👫💞", hint:"Lo que somos tú y yo", answer:"pareja" }
      ],
      [
        { type:"emoji", emojis:"💌🎉", hint:"Al terminar este juego tendras la...", answer:"sorpresa" },
        { type:"emoji", emojis:"🥰✨", hint:"Cómo me siento pensando en darte esto", answer:"feliz" },
        { type:"emoji", emojis:"👨‍👩‍👧💕", hint:"Lo que seremos algun día", answer:"familia" }
      ]
    ]
  }
];

/* ============================================================
   LÓGICA — no hace falta tocar nada de aquí para abajo
   ============================================================ */
const STORAGE_KEY = "sorpresaCineState_v1";
const STATE_VERSION = 3; // súbelo si vuelves a cambiar la estructura del estado o el número de niveles

function normalize(str){
  return str.toString().trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]/g,"");
}

function loadState(){
  const raw = localStorage.getItem(STORAGE_KEY);
  const now = Date.now();
  const capMs = DEADLINE.getTime() - now;
  if(raw){
    try{
      const s = JSON.parse(raw);
      if(s.version === STATE_VERSION){
        const elapsed = now - s.refTs;
        s.remainingMs = s.remainingMsAtRef - elapsed;
        return s;
      }
    }catch(e){}
  }
  return {
    version: STATE_VERSION,
    cap: capMs,
    floor: MINUTOS_MINIMOS*60*1000,
    remainingMs: capMs,
    remainingMsAtRef: capMs,
    refTs: now,
    phase: "welcome", // welcome | levelIntro | puzzle | waiting
    levelIndex: 0,
    puzzleIndex: 0,
    lives: 3,
    currentVariants: [null, null],
    lastVariants: [null, null],
    allDone: false,
    started: false
  };
}

function saveState(){
  state.refTs = Date.now();
  state.remainingMsAtRef = state.remainingMs;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

function fmt(ms){
  if(ms < 0) ms = 0;
  const totalSec = Math.floor(ms/1000);
  const h = Math.floor(totalSec/3600);
  const m = Math.floor((totalSec%3600)/60);
  const s = totalSec%60;
  const pad = n => n.toString().padStart(2,"0");
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}

function renderHearts(){
  const el = document.getElementById("hearts");
  el.innerHTML = "";
  for(let i=0;i<3;i++){
    const lost = i >= state.lives;
    const div = document.createElement("div");
    div.className = "heart" + (lost ? " lost" : "");
    div.innerHTML = `<svg viewBox="0 0 24 24" fill="${lost ? '#7A3A46' : '#D8657A'}"><path d="M12 21s-7.5-4.6-10-9.3C.4 8.4 2.2 5 5.6 5c2 0 3.4 1.1 4.4 2.6C11 6.1 12.4 5 14.4 5c3.4 0 5.2 3.4 3.6 6.7C19.5 16.4 12 21 12 21z"/></svg>`;
    el.appendChild(div);
  }
}

function tick(){
  const now = Date.now();
  const elapsed = now - state.refTs;
  let remaining = state.remainingMsAtRef - elapsed;
  if(remaining > state.cap) remaining = state.cap;
  if(remaining < 0) remaining = 0;
  state.remainingMs = remaining;
  document.getElementById("timerValue").textContent = fmt(remaining);

  if(remaining <= 0){
    clearInterval(intervalRef);
    render();
  }
}

let intervalRef = setInterval(tick, 1000);

const WIN_STEP_MS = () => (state.cap - state.floor) / (LEVELS.length*2);
const LOSS_STEP_MS = MINUTOS_POR_VIDA_PERDIDA*60*1000;

function applyWin(){
  const before = state.remainingMs;
  state.remainingMs = Math.max(state.remainingMs - WIN_STEP_MS(), state.floor);
  saveState();
  return Math.round((before - state.remainingMs)/60000);
}

function applyLoss(){
  const before = state.remainingMs;
  state.remainingMs = Math.min(state.remainingMs + LOSS_STEP_MS, state.cap);
  saveState();
  return Math.round((state.remainingMs - before)/60000);
}

function pickVariant(slotIndex){
  const pool = LEVELS[state.levelIndex].puzzles[slotIndex];
  if(pool.length <= 1){ state.currentVariants[slotIndex] = 0; return; }
  let idx;
  do{
    idx = Math.floor(Math.random()*pool.length);
  } while(idx === state.lastVariants[slotIndex]);
  state.currentVariants[slotIndex] = idx;
}

function currentPuzzle(){
  const slot = state.puzzleIndex;
  if(state.currentVariants[slot] === null) pickVariant(slot);
  return LEVELS[state.levelIndex].puzzles[slot][state.currentVariants[slot]];
}

function enterLevel(levelIndex){
  state.levelIndex = levelIndex;
  state.puzzleIndex = 0;
  state.lives = 3;
  state.currentVariants = [null, null];
  state.lastVariants = [null, null];
  state.phase = "levelIntro";
}

let locked = false;

function handleResult(isCorrect, feedbackEl){
  if(locked) return;
  locked = true;

  if(isCorrect){
    const minutos = applyWin();
    feedbackEl.textContent = `¡Ganaste! -${minutos} min al contador`;
    feedbackEl.className = "feedback ok";
    setTimeout(()=>{
      state.lastVariants[state.puzzleIndex] = state.currentVariants[state.puzzleIndex];
      if(state.puzzleIndex === 0){
        state.puzzleIndex = 1;
        state.lives = 3;
        saveState();
        render();
      } else {
        if(state.levelIndex === LEVELS.length - 1){
          state.allDone = true;
          state.phase = "waiting";
          saveState();
          render();
        } else {
          enterLevel(state.levelIndex + 1);
          saveState();
          render();
        }
      }
    }, 900);
  } else {
    state.lives -= 1;
    const minutos = applyLoss();
    if(state.lives <= 0){
      feedbackEl.textContent = `Perdiste. +${minutos} min al contador. Reiniciando el nivel...`;
      feedbackEl.className = "feedback err";
      setTimeout(()=>{
        state.lastVariants[state.puzzleIndex] = state.currentVariants[state.puzzleIndex];
        state.puzzleIndex = 0;
        state.lives = 3;
        state.currentVariants = [null, null];
        saveState();
        render();
      }, 1300);
    } else {
      feedbackEl.textContent = `Perdiste. +${minutos} min al contador. Te quedan ${state.lives} vida(s).`;
      feedbackEl.className = "feedback err";
      renderHearts();
      saveState();
      locked = false;
    }
  }
}

function submitAnswer(inputEl, feedbackEl){
  const puzzle = currentPuzzle();
  const guess = normalize(inputEl.value);
  const correct = normalize(puzzle.answer);
  if(guess.length === 0) return;
  const isCorrect = guess === correct;
  handleResult(isCorrect, feedbackEl);
  if(!isCorrect){
    inputEl.value = "";
    inputEl.focus();
  }
}

function screenWelcome(){
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <p class="eyebrow">Función privada</p>
    <h1 class="title">Hola, ${NOVIA_NAME} 🎬</h1>
    <p>Esto no es un link cualquiera. Ahí arriba a la izquierda hay un contador... y no vas a poder ver lo que hay del otro lado hasta que llegue a cero.</p>
    <p><strong>Así funciona:</strong></p>
    <p class="dim">
      • Son 4 niveles, cada uno con 2 pruebas.<br>
      • Cada vez que aciertes, el contador de arriba baja.<br>
      • Tienes 3 vidas por nivel (los corazones de arriba). Si fallas, pierdes una vida y el contador sube un poco.<br>
      • Si pierdes tus 3 vidas, ese nivel se reinicia — pero no vuelves a empezar desde el nivel 1.<br>
      • Cuando pases los 4 niveles, solo falta que el contador llegue a cero.
    </p>
    <button class="btn" id="startBtn">Comenzar función</button>
  `;
  div.querySelector("#startBtn").addEventListener("click", ()=>{
    state.started = true;
    enterLevel(0);
    saveState();
    render();
  });
  return div;
}

function screenLevelIntro(){
  const level = LEVELS[state.levelIndex];
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <span class="level-tag">${level.title}</span>
    <h2 class="title">${level.title.split("·")[1] ? level.title.split("·")[1].trim() : level.title}</h2>
    <p>${level.intro}</p>
    <p class="dim">2 pruebas · 3 vidas</p>
    <button class="btn" id="continueBtn">Continuar</button>
  `;
  div.querySelector("#continueBtn").addEventListener("click", ()=>{
    state.phase = "puzzle";
    saveState();
    render();
  });
  return div;
}

function screenLevel(){
  const puzzle = currentPuzzle();
  const level = LEVELS[state.levelIndex];
  const div = document.createElement("div");
  div.className = "card";

  let bodyHtml = "";
  if(puzzle.type === "riddle"){
    bodyHtml = `<p>${puzzle.prompt}</p>`;
  } else if(puzzle.type === "complete"){
    bodyHtml = `
      <p class="dim">${puzzle.hint}</p>
      <div class="puzzle-word">${puzzle.display}</div>
    `;
  } else if(puzzle.type === "emoji"){
    bodyHtml = `
      <p class="dim">${puzzle.hint}</p>
      <div class="puzzle-word" style="font-size:2.4rem; letter-spacing:.1em;">${puzzle.emojis}</div>
    `;
  } else if(puzzle.type === "truefalse"){
    bodyHtml = `<p>${puzzle.statement}</p>`;
  } else if(puzzle.type === "multiple"){
    bodyHtml = `<p>${puzzle.prompt}</p>`;
  }

  div.innerHTML = `
    <span class="level-tag">${level.title} · prueba ${state.puzzleIndex+1}/2</span>
    ${bodyHtml}
    <div id="controls"></div>
    <div class="feedback" id="feedback"></div>
  `;

  const feedback = div.querySelector("#feedback");
  const controls = div.querySelector("#controls");

  if(puzzle.type === "truefalse"){
    controls.innerHTML = `
      <div class="option-row">
        <button class="btn opt-btn" data-val="true">Verdadero</button>
        <button class="btn secondary opt-btn" data-val="false">Falso</button>
      </div>
    `;
    controls.querySelectorAll(".opt-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const val = btn.dataset.val === "true";
        handleResult(val === puzzle.answer, feedback);
      });
    });
  } else if(puzzle.type === "multiple"){
    controls.innerHTML = `<div class="option-list">` +
      puzzle.options.map(opt => `<button class="btn secondary opt-btn" data-val="${opt}">${opt}</button>`).join("") +
      `</div>`;
    controls.querySelectorAll(".opt-btn").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        handleResult(normalize(btn.dataset.val) === normalize(puzzle.answer), feedback);
      });
    });
  } else {
    controls.innerHTML = `
      <input type="text" id="answerInput" placeholder="Escribe tu respuesta" autocomplete="off">
      <button class="btn" id="submitBtn">Responder</button>
    `;
    const input = controls.querySelector("#answerInput");
    const submit = () => submitAnswer(input, feedback);
    controls.querySelector("#submitBtn").addEventListener("click", submit);
    input.addEventListener("keydown", (e)=>{ if(e.key === "Enter") submit(); });
    setTimeout(()=>input.focus(), 50);
  }

  return div;
}

function screenWaiting(){
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <p class="eyebrow">Niveles completados ✦</p>
    <h2 class="title">¡Completaste los 4 niveles!</h2>
    <p>Ya hiciste tu parte. La sorpresa se revela sola en cuanto el contador de arriba llegue a cero.</p>
    <p class="dim">Puedes cerrar y volver a abrir este link, el contador sigue corriendo.</p>
  `;
  return div;
}

function screenReveal(){
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <p class="eyebrow" style="text-align:center">¡Es hora!</p>
    <h2 class="title" style="text-align:center">Tu boleto está listo</h2>
    <div class="ticket-wrap">
      <img id="ticketPhoto" src="boleto.jpg" alt="Boleto de cine" style="display:none">
      <div class="ticket" id="ticketFallback">
        <div class="ticket-main">
          <span class="kicker">Boleto digital</span>
          <h3>${PELICULA}</h3>
          <div class="row"><span>${SALA}</span><span>Asiento ${ASIENTO}</span></div>
        </div>
        <div class="ticket-stub">ADMIT TWO</div>
      </div>
    </div>
    <p style="margin-top:20px">${MENSAJE_FINAL}</p>
    <p class="footer-note">Con amor, para ti 💛</p>
  `;
  const img = div.querySelector("#ticketPhoto");
  const fallback = div.querySelector("#ticketFallback");
  img.onload = () => { img.style.display = "block"; fallback.style.display = "none"; };
  img.onerror = () => { img.style.display = "none"; fallback.style.display = "flex"; };
  return div;
}

function render(){
  locked = false;
  renderHearts();
  const app = document.getElementById("app");
  app.innerHTML = "";

  if(state.remainingMs <= 0){
    app.appendChild(screenReveal());
    return;
  }
  if(!state.started || state.phase === "welcome"){
    app.appendChild(screenWelcome());
    return;
  }
  if(state.phase === "levelIntro"){
    app.appendChild(screenLevelIntro());
    return;
  }
  if(state.phase === "waiting" || state.allDone){
    app.appendChild(screenWaiting());
    return;
  }
  app.appendChild(screenLevel());
}

render();
saveState();

if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
